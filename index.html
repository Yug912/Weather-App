<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="searchbar">
                <input class="cityname" type="text"  placeholder="Enter city name" class="input-box">
                <button class="searchbtn"><i class="fa-solid fa-magnifying-glass"></i></button>
              
            
            </div>
        </div>
        <div class="weather-body">
            <img src="cloud.png" class="weather-image" alt="Weather Image">
            <div class="temp">0<sup>°C</sup></div>
            <div class="description">Light rain</div>
            <div class="weather-details">
                <div class="humidity">
                    <i class="fa-solid fa-droplet"></i>
                    <span id="humidity">0%</span>
                     <p>Humidity</p>
                </div>
            
            <div class="wind">
                <i class="fa-solid fa-wind"></i>
                <span id="wind-speed">12Km/h</span>
                <p>Wind Speed</p>
            </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script src="https://kit.fontawesome.com/25764d1c61.js" crossorigin="anonymous"></script>
</body>
</html>
